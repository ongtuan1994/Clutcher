# Cloud Build → Artifact Registry → (optional) Cloud Run deploy
# Set substitutions in the trigger: _REGION, _REPO, _SERVICE
substitutions:
  _REGION: asia-southeast1
  _REPO: clutcher
  _SERVICE: clutcher-api
  _IMAGE_NAME: api

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-southeast1-docker.pkg.dev/clutcher-saas/clutcher/api:$SHORT_SHA', '.']

  # 2. Push image ไปที่ Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-southeast1-docker.pkg.dev/clutcher-saas/clutcher/api:$SHORT_SHA']

  # 3. Deploy ไปยัง Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'clutcher-api'
      - '--image=asia-southeast1-docker.pkg.dev/clutcher-saas/clutcher/api:$SHORT_SHA'
      - '--region=asia-southeast1'
      - '--service-account=clutcher-api@clutcher-saas.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=clutcher-saas:asia-southeast1:clutcher-db-instance'
      - '--set-secrets=DATABASE_URL=clutcher-database-url:latest,JWT_SECRET=clutcher-jwt-secret:latest'
      - '--set-env-vars=GCS_BUCKET=clutcher-uploads-saas-2026,CORS_ORIGIN=*'

images:
  - 'asia-southeast1-docker.pkg.dev/clutcher-saas/clutcher/api:$SHORT_SHA'
