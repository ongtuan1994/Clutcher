# Local PostgreSQL for Prisma (replaces SQLite file DB)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clutcher
      POSTGRES_PASSWORD: clutcher
      POSTGRES_DB: clutcher
    ports:
      # Host 5433 avoids conflict when another app already uses 5432 (e.g. another Postgres container).
      - '5433:5432'
    volumes:
      - clutcher_pg:/var/lib/postgresql/data

volumes:
  clutcher_pg:
